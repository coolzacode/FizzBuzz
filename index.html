<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FizzBuzz</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <main class="container">
        <section class="output-section" id="output-section"></section>
        <section class="input-section" id="input-section">
            <div class="top-btn">
                <button class="btn fizz-btn" data-guess="Fizz">Fizz</button>
                <button class="btn fizzbuzz-btn" data-guess="FizzBuzz">FizzBuzz</button>
                <button class="btn buzz-btn" data-guess="Buzz">Buzz</button>
            </div>
            <div class="bottom-btn">
                <button class="btn none-btn" data-guess="None">None</button>
            </div>
        </section>
    </main>
</body>
</html>
